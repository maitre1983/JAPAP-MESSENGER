<!doctype html>
<html lang="fr" translate="no">
    <head>
        <meta charset="utf-8" />
        <!-- iter237j — Disable Chrome / Edge / Safari auto-translate.
             When the browser auto-translates the page (very common for
             non-French users in India / SE Asia / Latin America), it wraps
             text nodes inside <font> tags. React's reconciler then crashes
             with "Failed to execute 'insertBefore' on 'Node'…" on the very
             next text update — a known React bug
             (https://github.com/facebook/react/issues/11538).
             The combo `<meta name="google" content="notranslate">` +
             `translate="no"` on <html> + the dynamic Helmet meta below
             instructs Chrome to skip auto-translation entirely. -->
        <meta name="google" content="notranslate" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
        <meta name="theme-color" content="#0F056B" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#0F056B" media="(prefers-color-scheme: dark)" />
        <meta name="description" content="JAPAP TECHNOLOGIES PLC — Plateforme africaine de messagerie sociale, marketplace, wallet USD et jeux d'agilité. Siège : Addis Ababa, Ethiopia." />
        <meta name="keywords" content="JAPAP, réseau social, marketplace, wallet, crowdfunding, fintech, Afrique, Cameroun, app sociale, super-app, paiement sécurisé, crypto" />
        <meta name="format-detection" content="telephone=no" />
        <meta name="robots" content="index,follow,max-image-preview:large" />
        <link rel="canonical" href="https://japapmessenger.com/" />
        <link rel="alternate" hreflang="fr" href="https://japapmessenger.com/" />
        <link rel="alternate" hreflang="x-default" href="https://japapmessenger.com/" />

        <!-- PWA manifest + icons -->
        <link rel="manifest" href="/manifest.json" />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="/japap-logo-192.png" />
        <link rel="icon" type="image/png" sizes="512x512" href="/japap-logo-512.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

        <!-- iOS-specific PWA hints -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="JAPAP" />

        <!-- iter141nineE — Smart App Banner (iOS) + Universal Links scaffolding.
             When the native JAPAP iOS app ships on the App Store, replace
             APP_ID with the numeric Apple ID. Until then, this is a no-op
             but harmless. The associated AASA file at
             /.well-known/apple-app-site-association already declares which
             paths (/pay/*, /duel/*, /r/*, …) belong to the app. -->
        <meta name="apple-itunes-app" content="app-id=APPLE_APP_ID_PLACEHOLDER" />
        <!-- Android: Chrome will surface a "Open in app" banner using the
             intent declared in manifest.json + the assetlinks.json file at
             /.well-known/. -->

        <!-- Open Graph (sharing) -->
        <meta property="og:title" content="JAPAP — Réseau social, Marketplace et Wallet sans frontières" />
        <meta property="og:description" content="Rejoins JAPAP : feed social, marketplace sécurisé, wallet USD, crowdfunding viral et IA intégrée. La super-app fintech & sociale." />
        <meta property="og:image" content="https://japapmessenger.com/japap-logo-512.png" />
        <meta property="og:image:width" content="512" />
        <meta property="og:image:height" content="512" />
        <meta property="og:url" content="https://japapmessenger.com/" />
        <meta property="og:site_name" content="JAPAP" />
        <meta property="og:locale" content="fr_FR" />
        <meta property="og:type" content="website" />

        <!-- Twitter / X -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="JAPAP — Réseau social, Marketplace et Wallet" />
        <meta name="twitter:description" content="Rejoins JAPAP : la super-app fintech & sociale sans frontières." />
        <meta name="twitter:image" content="https://japapmessenger.com/japap-logo-512.png" />
        <meta name="twitter:site" content="@japap" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />

        <title>JAPAP Messenger — JAPAP TECHNOLOGIES PLC (Addis Ababa)</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>

        <!-- OneSignal Web Push SDK v16 (iter71) -->
        <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root" translate="no" class="notranslate"></div>
    </body>
</html>
