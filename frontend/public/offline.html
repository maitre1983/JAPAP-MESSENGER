<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>JAPAP · Hors ligne</title>
    <meta name="theme-color" content="#0F056B" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; min-height: 100%; }
      body {
        background: radial-gradient(circle at top, #1A0F5A 0%, #0F056B 60%, #050128 100%);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        min-height: 100vh;
      }
      .card {
        max-width: 420px;
        text-align: center;
      }
      .logo {
        background: #fff;
        border-radius: 16px;
        padding: 10px 14px;
        display: inline-block;
        box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      }
      .logo img { width: 120px; height: auto; display: block; }
      h1 { font-size: 24px; margin: 28px 0 8px; font-weight: 700; }
      p { font-size: 15px; color: rgba(255,255,255,0.75); line-height: 1.5; margin: 0 0 24px; }
      .btn {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 999px;
        background: #E01C2E;
        color: white;
        font-weight: 600;
        border: 0;
        font-size: 15px;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(224,28,46,0.4);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <img src="/japap-logo.jpg" alt="JAPAP" />
      </div>
      <h1>Aucune connexion</h1>
      <p>
        Vous êtes actuellement hors ligne. Vérifiez votre connexion Wi-Fi ou vos données mobiles,
        puis réessayez.
      </p>
      <button class="btn" onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
